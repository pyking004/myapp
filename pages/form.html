<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form:HTML</title>
    </head>
    <body>
        <form action="">
            <label for="">User Name :</label>
            <input type="text" name="" id=""> <br><br>
            <label for="">Email</label>
            <input type="email" name="" id=""> <br><br>
            <label for="">Contact</label>
            <input type="number" name="" id=""> <br><br>
            <label for="">LandLine</label>
            <input type="tel" name="" id=""> <br><br>
            <label for="">Password</label>
            <input type="password" name="" id=""> <br><br>
            <label for="">Gender</label>
            <input type="radio" name="gender" id=""> Male
            <input type="radio" name="gender" id=""> Female <br><br>
            <label for="">Course Type</label>
            <input type="checkbox" name="" id=""> Online
            <input type="checkbox" name="" id=""> Class Room <br><br>
            <label for="">Course :</label>
            <select name="" id="">
                <optgroup label="Coding">
                    <option value="py">Python</option>
                    <option value="java">Java</option>
                    <option value="js" selected>JavaScript</option>
                    <option value="re">React</option>
                </optgroup>
                <optgroup label="AI">
                    <option value="ML">Machine Learning</option>
                    <option value="DL">Deep Learning</option>
                    <option value="NLP">NLP</option>
                </optgroup>
                <optgroup label="Cloud">
                    <option value="NLP">AWS</option>
                    <option value="NLP">GCP</option>
                    <option value="NLP">Azure</option>
                </optgroup>
                <optgroup label="UI">
                    <option value="NLP">HTML</option>
                    <option value="NLP">CSS</option>
                    <option value="NLP">TailwindCSS</option>
                </optgroup>
            </select> <br><br>
            <label for="">DOB</label>
            <input type="date" name="" id=""> <br><br>
            <label for="">Join Date</label>
            <input type="datetime" name="" id=""> <br><br>
            <label for="">Start Date and Time</label>
            <input type="datetime-local" name="" id=""> <br><br>
            <label for="">Week</label>
            <input type="week" name="" id=""> <br><br>
            <label for="">Month</label>
            <input type="month" name="" id=""> <br><br>
            <label for="">Time</label>
            <input type="time" name="" id=""> <br><br>
            <label for="">Resume</label>
            <input type="file" name="" id=""> <br><br>
            <label for="">Documents</label>
            <input type="file" name="" id="" multiple> <br><br>
            <label for="">Project URL</label>
            <input type="url" name="" id="" size="60"> <br><br>
            <label for="">Rate Your Self</label>
            <input type="range" name="" id=""> <br><br>
            <label for="">Color</label>
            <input type="color" name="" id=""> <br><br>
            <input type="hidden" name="" value="QEdge"> 
            <label for="">About Me</label> <br>
            <textarea name="" id="" cols="50" rows="5"></textarea> <br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Cancel">
            <input type="button" value="ClickMe" onclick="f1()">
            <input type="image" src="/images/submit.jpg" alt="" width="100" height="40">
        </form>
        <script>
            function f1(){
                alert("clickMe Button Clicked");
            }
        </script>
    </body>
</html>
